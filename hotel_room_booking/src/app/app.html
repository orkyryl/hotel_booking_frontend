<div class="page">
  <header class="header">
    <div class="header__inner">
      <a routerLink="/" class="brand" aria-label="Hotel Room Booking">
        <div class="brand__mark" aria-hidden="true"></div>
        <div class="brand__text">
          <div class="brand__name">{{ title() }}</div>
          <div class="brand__tagline">Find rooms • Book fast • Manage stays</div>
        </div>
      </a>

      <nav class="nav" aria-label="Primary navigation">
        <a class="nav__link" routerLink="/" fragment="search">Search</a>
        <a class="nav__link" routerLink="/" fragment="featured">Featured</a>
        <a class="nav__link" routerLink="/profile">Profile</a>
      </nav>

      <div class="header__actions">
        @if (isLoggedIn) {
          <a class="btn btn--ghost" routerLink="/profile">Profile</a>
          <button class="btn btn--primary" type="button" (click)="logout()">Log out</button>
        } @else {
          <a class="btn btn--ghost" routerLink="/login">Sign in</a>
          <a class="btn btn--primary" routerLink="/register">Create account</a>
        }
      </div>
    </div>
  </header>

  <main class="main">
    <router-outlet></router-outlet>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__left">
        <div class="footer__brand">{{ title() }}</div>
        <div class="footer__muted">© 2026 • Built with Angular</div>
      </div>
      <div class="footer__right">
        <a class="footer__link" routerLink="/" fragment="search">Search</a>
        <a class="footer__link" routerLink="/" fragment="featured">Featured</a>
      </div>
    </div>
  </footer>
</div>
